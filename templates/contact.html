{% extends "base.html" %}
{% load static %}

{% block title %}Contact Us - Curated{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'contact.css' %}" />
{% endblock %}

{% block content %}


     <!-- Contact Section -->
    <section id="contact" class="contact">
        <div class="section">
            <h2 class="section-title fade-in">Initiate Your Transformation</h2>
            <div class="contact-content">
                <!-- <p>Ready to transcend conventional business boundaries? Let's architect your strategic future together.</p> -->
                <form class="contact-form fade-in">
                    <div class="contact-form-head">
                        <h3>Contact Us</h3>
                        <span>We usually reply within 24 hours.</span>
                    </div>
                    <div class="contact-fields">
                        <div class="contact-field">
                            <label for="contact-name">Name</label>
                            <input id="contact-name" type="text" placeholder="Enter your name" required>
                        </div>
                        <div class="contact-field">
                            <label for="contact-email">Email Address</label>
                            <input id="contact-email" type="email" placeholder="Enter your email address" required>
                        </div>
                        <div class="contact-field contact-field-full">
                            <label for="contact-message">Message</label>
                            <textarea id="contact-message" placeholder="Leave Your message ..." required></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="contact-links">
                <a href="mailto:info@senlageinvestments.com" class="contact-link-item">info@curated.com</a>
                <a href="tel:+263770123456" class="contact-link-item">+263 77 012 3456</a>
            </div>
        </div>
    </section>


{% endblock %}
